name: Feature Request
description: Suggest an idea or improvement for Istar Pack
title: "[FEATURE] <short summary>"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea to make Istar Pack better? Tell us about it.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? Why is this needed?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches or workarounds you've thought about.
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - New theme
        - New tool install
        - Profile / config change
        - Installation flow
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Links, screenshots, references, or anything else useful.
